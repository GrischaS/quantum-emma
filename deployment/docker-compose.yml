version: "3.9"

# ============================================================
#  QUANTUM EMMA — Docker Compose Enterprise Stack
#  App + Redis + Postgres + Nginx + SSL
#  © 2026 Grigori Saks
# ============================================================

services:
  # ── Main App ──────────────────────────────────────────────
  quantum-emma:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: quantum-emma-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://qemma:${DB_PASSWORD}@postgres:5432/quantumemma
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.quantum-emma.rule=Host(`quantum-emma.com`)"
      - "traefik.http.routers.quantum-emma.tls.certresolver=letsencrypt"

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: quantum-emma-db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: qemma
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: quantumemma

  # ── Redis Cache ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: quantum-emma-redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # ── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: quantum-emma-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt
    depends_on:
      - quantum-emma

volumes:
  postgres_data:
  redis_data:
  certbot_certs:
