# ============================================================
#  QUANTUM EMMA — CI/CD Auto-Deploy Pipeline v4.1
#  Triggers on every push to main
#  Deploys to Vercel + Netlify simultaneously
#  © 2026 Grigori Saks — All Rights Reserved — Patent Pending
# ============================================================

name: 🚀 Quantum Emma — Auto Deploy v4.1

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  NODE_VERSION: "20"
  APP_NAME: "quantum-emma"
  VERSION: "4.1.0"

jobs:
  # ─── 1. LINT & TYPE CHECK ─────────────────────────────────
  quality:
    name: 🔍 Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Lint
        run: npm run lint --if-present

      - name: Type Check
        run: npm run type-check --if-present

      - name: ✅ Quality Check Passed
        run: echo "Code quality checks passed!"

  # ─── 2. BUILD ─────────────────────────────────────────────
  build:
    name: 🏗 Build Web App
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build production bundle
        run: npm run build
        env:
          NODE_ENV: production
          REACT_APP_VERSION: ${{ env.VERSION }}
          REACT_APP_NAME: Quantum Emma
          REACT_APP_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantum-emma-build-${{ github.sha }}
          path: dist/
          retention-days: 7

      - name: ✅ Build Success
        run: echo "Build completed successfully!"

  # ─── 3. SMART CONTRACT COMPILE ───────────────────────────
  contracts:
    name: 📜 Compile Smart Contracts
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Hardhat
        run: |
          npm install --save-dev hardhat @openzeppelin/contracts \
            @nomicfoundation/hardhat-toolbox ethers dotenv

      - name: Compile Contracts
        run: npx hardhat compile
        working-directory: .

      - name: ✅ Contracts Compiled
        run: echo "All 7 smart contracts compiled successfully!"

  # ─── 4. DEPLOY → VERCEL ──────────────────────────────────
  deploy-vercel:
    name: ▲ Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: vercel-production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel Production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: ✅ Vercel Deploy Success
        run: echo "Deployed to Vercel — ${{ steps.deploy.outputs.url }}"

  # ─── 5. DEPLOY → NETLIFY ─────────────────────────────────
  deploy-netlify:
    name: 🌐 Deploy to Netlify
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: netlify-production
      url: https://quantum-emma.netlify.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: quantum-emma-build-${{ github.sha }}
          path: dist/

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@latest

      - name: Deploy to Netlify Production
        run: |
          netlify deploy \
            --dir=dist \
            --prod \
            --message="Quantum Emma v${{ env.VERSION }} — commit ${{ github.sha }}" \
            --site=${{ secrets.NETLIFY_SITE_ID }} \
            --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: ✅ Netlify Deploy Success
        run: echo "Deployed to Netlify — https://quantum-emma.netlify.app"

  # ─── 6. AUTO RELEASE NOTES ───────────────────────────────
  release-notes:
    name: 📋 Generate Release Notes
    runs-on: ubuntu-latest
    needs: [deploy-vercel, deploy-netlify]
    if: github.event_name == 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --abbrev=0 --tags HEAD~1 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline $LAST_TAG..HEAD --no-merges | head -30)
          else
            COMMITS=$(git log --oneline -20 --no-merges)
          fi
          echo "COMMITS<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update Release Notes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: release } = await github.rest.repos.getLatestRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const commits = `${{ steps.changelog.outputs.COMMITS }}`;
            const body = `## 🚀 Quantum Emma Enterprise v${{ env.VERSION }}
            ### © 2026 Grigori Saks — Patent Pending
            
            **Live:** https://quantum-emma-app.base44.app
            **Vercel:** https://quantum-emma.vercel.app
            **Netlify:** https://quantum-emma.netlify.app
            
            ### 📦 Changes in this release
            \`\`\`
            ${commits}
            \`\`\`
            
            ### ✅ Deployed to
            - ▲ Vercel Production
            - 🌐 Netlify Production
            - 🏠 Base44 (quantum-emma-app.base44.app)
            
            *Built with Meta Genius TR2 · HQMLL · Krealogoik*`;
            
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: body,
            });

  # ─── 7. NOTIFY SUCCESS ───────────────────────────────────
  notify:
    name: 🔔 Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-vercel, deploy-netlify]
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║   QUANTUM EMMA v4.1 — DEPLOYMENT COMPLETE   ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  ▲ Vercel:  https://quantum-emma.vercel.app ║"
          echo "║  🌐 Netlify: https://quantum-emma.netlify.app║"
          echo "║  🏠 Base44:  quantum-emma-app.base44.app    ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  Commit: ${{ github.sha }}                  ║"
          echo "║  Branch: ${{ github.ref_name }}             ║"
          echo "║  Actor:  ${{ github.actor }}                ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "© 2026 Grigori Saks — Enterprise v4.1 — Patent Pending"
