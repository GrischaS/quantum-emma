name: 🚀 Quantum Emma — Auto Deploy v4.1

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ─── 1. CODE QUALITY CHECK ────────────────────────────────
  quality:
    name: 🔍 Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate project structure
        run: |
          echo "=== Project Structure ==="
          echo "Pages:     $(ls pages/*.jsx 2>/dev/null | wc -l) JSX files"
          echo "Contracts: $(ls contracts/*.sol 2>/dev/null | wc -l) Solidity files"
          echo "Android:   $(ls android/src/screens/*.tsx 2>/dev/null | wc -l) screens"
          echo "✅ Structure validated"

      - name: Compile smart contracts
        run: |
          npm install --save-dev hardhat @nomicfoundation/hardhat-toolbox @openzeppelin/contracts ethers dotenv
          cp deployment/hardhat.config.js hardhat.config.js
          npx hardhat compile && echo "✅ All 7 contracts compiled"
        continue-on-error: true

      - name: ✅ Quality check done
        run: echo "Quality gate passed ✅"

  # ─── 2. DEPLOY TO VERCEL ──────────────────────────────────
  deploy-vercel:
    name: ▲ Deploy to Vercel
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check Vercel secrets
        id: check-vercel
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "⚠️  VERCEL_TOKEN not set — skipping Vercel deploy"
          else
            echo "has_token=true" >> $GITHUB_OUTPUT
            echo "✅ Vercel token found"
          fi

      - name: Install Vercel CLI
        if: steps.check-vercel.outputs.has_token == 'true'
        run: npm install -g vercel

      - name: Deploy to Vercel
        if: steps.check-vercel.outputs.has_token == 'true'
        run: |
          vercel --token ${{ secrets.VERCEL_TOKEN }} \
            --yes \
            --prod \
            --name quantum-emma
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        continue-on-error: true

      - name: Vercel deploy status
        run: |
          if [ "${{ steps.check-vercel.outputs.has_token }}" == "true" ]; then
            echo "🚀 Vercel deployment triggered"
          else
            echo "⏭️  Vercel skipped (add VERCEL_TOKEN secret to enable)"
            echo "   → https://github.com/GrischaS/quantum-emma/settings/secrets/actions"
          fi

  # ─── 3. DEPLOY TO NETLIFY ─────────────────────────────────
  deploy-netlify:
    name: 🌐 Deploy to Netlify
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Check Netlify secrets
        id: check-netlify
        run: |
          if [ -z "${{ secrets.NETLIFY_AUTH_TOKEN }}" ]; then
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "⚠️  NETLIFY_AUTH_TOKEN not set — skipping Netlify deploy"
          else
            echo "has_token=true" >> $GITHUB_OUTPUT
            echo "✅ Netlify token found"
          fi

      - name: Install Netlify CLI
        if: steps.check-netlify.outputs.has_token == 'true'
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        if: steps.check-netlify.outputs.has_token == 'true'
        run: |
          netlify deploy \
            --auth ${{ secrets.NETLIFY_AUTH_TOKEN }} \
            --site ${{ secrets.NETLIFY_SITE_ID }} \
            --dir . \
            --prod \
            --message "Quantum Emma v4.1 — ${{ github.sha }}"
        continue-on-error: true

      - name: Netlify deploy status
        run: |
          if [ "${{ steps.check-netlify.outputs.has_token }}" == "true" ]; then
            echo "🌐 Netlify deployment triggered"
          else
            echo "⏭️  Netlify skipped (add NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID to enable)"
            echo "   → https://github.com/GrischaS/quantum-emma/settings/secrets/actions"
          fi

  # ─── 4. DEPLOYMENT SUMMARY ────────────────────────────────
  summary:
    name: 🔔 Deployment Summary
    runs-on: ubuntu-latest
    needs: [quality, deploy-vercel, deploy-netlify]
    if: always()
    steps:
      - name: Print deployment summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║     QUANTUM EMMA DEPLOYMENT SUMMARY — v4.1       ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  Branch: main"
          echo "║  SHA:    ${{ github.sha }}"
          echo "║  Actor:  ${{ github.actor }}"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  🔍 Quality:  ${{ needs.quality.result }}"
          echo "║  ▲  Vercel:   ${{ needs.deploy-vercel.result }}"
          echo "║  🌐 Netlify:  ${{ needs.deploy-netlify.result }}"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  Live:  https://quantum-emma-app.base44.app      ║"
          echo "║  Repo:  https://github.com/GrischaS/quantum-emma ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  © 2026 Grigori Saks — Patent Pending            ║"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""
          echo "✅ Deployment pipeline completed"
