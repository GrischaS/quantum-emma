# ============================================================
#  QUANTUM EMMA — Auto Release Notes v5.2
#  Triggered by: git tag v*.*.* push or workflow_dispatch
#  (c) 2026 Grigori Saks — All Rights Reserved — Patent Pending
# ============================================================

name: "\U0001F4CB Auto Release Notes"

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v5.2.0)"
        required: true
        default: "v5.2.0"
      prerelease:
        description: "Mark as pre-release?"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

jobs:

  # ─── 1. GENERATE RELEASE NOTES ────────────────────────────
  generate:
    name: "\U0001F4DD Generate Release Notes"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version info
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "Tag: ${TAG}"

      - name: Get previous tag
        id: prev
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "${{ steps.version.outputs.tag }}" | head -1 || echo "")
          echo "prev_tag=${PREV}" >> $GITHUB_OUTPUT
          echo "Prev tag: ${PREV}"
        continue-on-error: true

      - name: Collect commits
        id: commits
        run: |
          PREV="${{ steps.prev.outputs.prev_tag }}"
          if [ -n "${PREV}" ]; then
            RANGE="${PREV}..HEAD"
          else
            RANGE="HEAD~20..HEAD"
          fi
          FEAT=$(git log ${RANGE} --oneline --no-merges 2>/dev/null | grep "^[a-f0-9]* feat" | wc -l || echo 0)
          FIX=$(git log ${RANGE}  --oneline --no-merges 2>/dev/null | grep "^[a-f0-9]* fix"  | wc -l || echo 0)
          CI=$(git log ${RANGE}   --oneline --no-merges 2>/dev/null | grep "^[a-f0-9]* ci"   | wc -l || echo 0)
          ALL=$(git log ${RANGE}  --oneline --no-merges 2>/dev/null | wc -l || echo 0)
          echo "feat=${FEAT}" >> $GITHUB_OUTPUT
          echo "fix=${FIX}"   >> $GITHUB_OUTPUT
          echo "ci=${CI}"     >> $GITHUB_OUTPUT
          echo "total=${ALL}" >> $GITHUB_OUTPUT
          echo "Commits — feat:${FEAT} fix:${FIX} ci:${CI} total:${ALL}"
        continue-on-error: true

      - name: Get project stats
        id: stats
        run: |
          PAGES=$(ls pages/*.jsx 2>/dev/null | wc -l || echo 10)
          CONTRACTS=$(ls contracts/*.sol 2>/dev/null | wc -l || echo 7)
          SCREENS=$(ls android/app/src/screens/*.tsx 2>/dev/null | wc -l || echo 6)
          echo "pages=${PAGES}"         >> $GITHUB_OUTPUT
          echo "contracts=${CONTRACTS}" >> $GITHUB_OUTPUT
          echo "screens=${SCREENS}"     >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Generate RELEASE.md
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          DATE="${{ steps.version.outputs.date }}"
          FEAT="${{ steps.commits.outputs.feat }}"
          FIX="${{ steps.commits.outputs.fix }}"
          ALL="${{ steps.commits.outputs.total }}"
          PREV="${{ steps.prev.outputs.prev_tag }}"
          PAGES="${{ steps.stats.outputs.pages }}"
          CONTRACTS="${{ steps.stats.outputs.contracts }}"
          SCREENS="${{ steps.stats.outputs.screens }}"

          cat > RELEASE.md << RELEOF
          # Quantum Emma ${TAG} — Release Notes
          **Date:** ${DATE}
          **Commits:** ${ALL} total (${FEAT} features, ${FIX} fixes)
          **Previous:** ${PREV}

          ## Stats
          - Web Pages: ${PAGES}
          - Smart Contracts: ${CONTRACTS}
          - Android Screens: ${SCREENS}

          ## Changelog
          RELEOF

          if [ -n "${PREV}" ]; then
            git log ${PREV}..HEAD --oneline --no-merges 2>/dev/null | head -30 >> RELEASE.md || true
          else
            git log HEAD~10..HEAD --oneline --no-merges 2>/dev/null >> RELEASE.md || true
          fi

          echo "" >> RELEASE.md
          echo "---" >> RELEASE.md
          echo "(c) 2026 Grigori Saks — Quantum Emma — Patent Pending" >> RELEASE.md
          cat RELEASE.md
        continue-on-error: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Quantum Emma ${{ steps.version.outputs.tag }}"
          body_path: RELEASE.md
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Done
        run: echo "Release notes generated for ${{ steps.version.outputs.tag }}"
