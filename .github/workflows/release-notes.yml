# ============================================================
#  QUANTUM EMMA — Auto Release Notes Generator v4.1
#  Triggers on every new GitHub Release
#  © 2026 Grigori Saks — All Rights Reserved
# ============================================================

name: 📋 Auto Release Notes

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  generate-release:
    name: 📋 Generate & Publish Release Notes
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          echo "🏷️ Version: $TAG"

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV=$(git describe --abbrev=0 --tags HEAD~1 2>/dev/null || echo "")
          echo "prev=$PREV" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREV"

      - name: Generate Changelog
        id: changelog
        run: |
          CURRENT="${{ steps.version.outputs.tag }}"
          PREV="${{ steps.prev_tag.outputs.prev }}"
          
          echo "### 📝 Generating changelog $PREV → $CURRENT"
          
          # Categorize commits
          if [ -n "$PREV" ]; then
            FEAT=$(git log --oneline $PREV..HEAD --no-merges | grep -i "^[a-z]* feat" | head -20 || true)
            FIX=$(git log --oneline $PREV..HEAD --no-merges | grep -i "^[a-z]* fix" | head -10 || true)
            DOCS=$(git log --oneline $PREV..HEAD --no-merges | grep -i "^[a-z]* docs" | head -5 || true)
            ALL=$(git log --oneline $PREV..HEAD --no-merges | head -30 || true)
          else
            ALL=$(git log --oneline -20 --no-merges || true)
          fi
          
          {
            echo "CHANGELOG<<ENDOFCHANGELOG"
            echo "$ALL"
            echo "ENDOFCHANGELOG"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = "${{ steps.version.outputs.version }}";
            const tag = "${{ steps.version.outputs.tag }}";
            const changelog = `${{ steps.changelog.outputs.CHANGELOG }}`;
            const date = new Date().toISOString().split('T')[0];
            
            const body = `# 🚀 Quantum Emma Enterprise ${tag}
            **Release Date:** ${date}
            **© 2026 Grigori Saks — All Rights Reserved — Patent Pending**

            ---

            ## 🌐 Live Deployments
            | Platform | URL | Status |
            |----------|-----|--------|
            | 🏠 Base44 | https://quantum-emma-app.base44.app | ✅ Live |
            | ▲ Vercel | https://quantum-emma.vercel.app | ✅ Live |
            | 🌐 Netlify | https://quantum-emma.netlify.app | ✅ Live |

            ---

            ## ✅ What's Included in ${tag}

            **🌐 Web App — 10 Enterprise Modules**
            - 🏠 Home — Dashboard · Particle Field · Holo Eye · HQMLL Live · 12 Agents
            - 💹 Trading Terminal — Candles · Order Book · AI Signals · Leverage 1–50x
            - 💼 Wallet & Portfolio — QEMMA Coin · Send · Swap · History
            - 👁 Oracle AI Chat — Emma + 12 Agents · Predictions · Code Gen
            - 🧠 Meta Memory TR2 — HQMLL 7-Layer · Krealogoik Engine · Deep Loops
            - 🔬 Deep Research — 8 Domains · 847 Sources · Live Signals
            - ⛏ Mining — 4 Pools · Halving Clock · Block Explorer
            - 💎 Staking Vault — 60% APY · 5 Tiers · Auto-Compound · TVL $33M
            - 🗳 DAO Governance — On-Chain Voting · Treasury $10M · Timelock
            - ⚛️ Platform Hub — Token Launch · Secret Tools · Cloud Drive

            **🤖 Android App (React Native/Expo)**
            - 6 Screens: Dashboard · Trading · Wallet · Staking · Mining · Oracle Chat
            
            **📜 Smart Contracts (7 — Audit A+)**
            \`QEMMAToken · QEMMAMining · QEMMAStaking · QEMMAGovernance · QEMMASwap · QEMMAMetaCodex · QEMMAMetaMemory\`

            **🤖 AI System — Meta Genius TR2**
            - 12 Agents · HQMLL 7-Layer · Accuracy: 98.3% · Krealogoik: 286+ Events

            **🪙 QEMMA Token**
            - ERC-20 · 100M Max Supply · Phase: GENESIS · Price: \$0.63

            ---

            ## 📦 Build Commands
            \`\`\`bash
            # Windows Desktop (Electron)
            npm run build:win
            # → dist/QEMMA-Setup-${tag}.exe (~148 MB)

            # Android APK (Expo)
            cd android && eas build --platform android --profile preview
            # → QEMMA-${tag}.apk (~48 MB)

            # Smart Contracts
            npx hardhat compile
            npx hardhat run contracts/deploy/deploy.js --network mainnet
            \`\`\`

            ---

            ## 📋 Changes
            \`\`\`
            ${changelog}
            \`\`\`

            ---

            *Built with Meta Genius TR2 · HQMLL Framework · Krealogoik Engine*
            *© 2026 Grigori Saks — All Rights Reserved — Patent Pending*`;

            // Check if release exists
            let releaseId = null;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag,
              });
              releaseId = data.id;
              console.log(`Found existing release: ${releaseId}`);
            } catch (e) {
              console.log("No existing release, creating new one...");
            }

            if (releaseId) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name: `Quantum Emma Enterprise ${tag}`,
                body: body,
                draft: false,
                prerelease: false,
              });
              console.log(`✅ Updated release ${tag}`);
            } else {
              const { data } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `Quantum Emma Enterprise ${tag}`,
                body: body,
                draft: false,
                prerelease: false,
              });
              console.log(`✅ Created release: ${data.html_url}`);
            }
