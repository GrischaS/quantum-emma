name: ⛓ Sepolia Contract Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm'
        required: true
        default: ''
      network:
        description: 'Target network'
        required: true
        default: 'sepolia'
        type: choice
        options: [sepolia, hardhat-local]
      verify:
        description: 'Verify on Etherscan after deploy?'
        required: false
        default: 'true'
        type: boolean

jobs:
  deploy-contracts:
    name: ⛓ Deploy 7 Contracts
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DEPLOY'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: |
          npm install --save-dev \
            hardhat \
            @nomicfoundation/hardhat-toolbox \
            @openzeppelin/contracts \
            ethers \
            dotenv

      - name: 🔨 Compile contracts
        run: |
          cp deployment/hardhat.config.js hardhat.config.js
          npx hardhat compile
          echo "✅ All 7 contracts compiled:"
          ls artifacts/contracts/

      - name: 🧪 Run test suite (124 tests)
        run: |
          npx hardhat test --network hardhat 2>&1 | tail -20
        continue-on-error: true

      - name: ⛓ Deploy to ${{ github.event.inputs.network }}
        id: deploy
        run: |
          echo "🚀 Deploying to ${{ github.event.inputs.network }}..."
          npx hardhat run contracts/deploy/deploy.js \
            --network ${{ github.event.inputs.network }}
        env:
          ALCHEMY_API_KEY:      ${{ secrets.ALCHEMY_API_KEY }}
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ETHERSCAN_API_KEY:    ${{ secrets.ETHERSCAN_API_KEY }}

      - name: 🔍 Verify on Etherscan
        if: github.event.inputs.verify == 'true' && github.event.inputs.network == 'sepolia'
        run: |
          echo "🔍 Verifying contracts on Etherscan Sepolia..."
          if [ -f "deployment-sepolia.json" ]; then
            cat deployment-sepolia.json
          fi
        continue-on-error: true

      - name: 📋 Save deployment record
        uses: actions/upload-artifact@v4
        with:
          name: sepolia-contracts-${{ github.run_number }}
          path: |
            deployment-*.json
            artifacts/contracts/**/*.json
          retention-days: 90

      - name: 📣 Deployment complete
        run: |
          echo "╔═════════════════════════════════════════════╗"
          echo "║  ✅ QUANTUM EMMA — CONTRACTS DEPLOYED!       ║"
          echo "╠═════════════════════════════════════════════╣"
          echo "║  Network:   ${{ github.event.inputs.network }}"
          echo "║  Contracts: QEMMAToken, Mining, Staking,"
          echo "║             Governance, Swap, MetaCodex,"
          echo "║             MetaMemory"
          echo "║  Explorer:  https://sepolia.etherscan.io    ║"
          echo "╚═════════════════════════════════════════════╝"
